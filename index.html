<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal de acesso aos materiais do Curso Técnico em Desenvolvimento de Sistemas do SENAI. Encontre aulas, exercícios e recursos para Banco de Dados, Programação Web, Mobile e muito mais.">
    <meta property="og:title" content="Curso Técnico em Desenvolvimento de Sistemas - SENAI">
    <meta property="og:description" content="Acesse todo o material didático, aulas e exercícios do curso técnico. Banco de Dados, Desenvolvimento de Sistemas e muito mais.">
    <meta property="og:image" content="assets/img/logo_senai.png">
    <meta property="og:type" content="website">
    <title>Curso de Desenvolvimento de Sistemas - SENAI</title>
    <style>
        :root {
            --senai-blue: #004587;
            --senai-red: #E32119;
            --bg-color: #f4f4f4;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--senai-blue);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        main {
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            text-align: center;
            border-top: 5px solid var(--senai-red);
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .card h2 {
            color: var(--senai-blue);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--senai-blue);
            color: white;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .card:hover .btn {
            background-color: #003366;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: auto;
        }
        
        .logo-placeholder {
            font-size: 3rem;
            color: var(--senai-red);
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

    <header>
        <h1>Curso Técnico em Desenvolvimento de Sistemas</h1>
        <p>Portal de Acesso às Disciplinas</p>
    </header>

    <main>
        <div class="grid-container">
            
            <!-- Card Banco de Dados -->
            <a href="BancoDeDados/index.html" class="card">
                <div>
                    <div class="logo-placeholder">🗄️</div>
                    <h2>Banco de Dados</h2>
                    <p>Fundamentos, Modelagem, SQL e NoSQL.</p>
                </div>
                <span class="btn">Acessar Aulas</span>
            </a>

            <!-- Card Desenvolvimento de Aplicativos -->
            <a href="DesenvolvimentoDeSistemas/index.html" class="card">
                <div>
                    <div class="logo-placeholder">💻</div>
                    <h2>Desenvolvimento de Aplicativos</h2>
                    <p>Java, PHP, Python e Mobile.</p>
                </div>
                <span class="btn">Acessar Módulos</span>
            </a>

        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentYear"></span> SENAI - Serviço Nacional de Aprendizagem Industrial</p>
        <script>
            document.getElementById('currentYear').textContent = new Date().getFullYear();
        </script>
    </footer>

</body>
</html>
